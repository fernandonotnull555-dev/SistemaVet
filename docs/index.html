<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Veterinaria — Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login (misma idea que login.html; sin PHP) -->
  <main id="loginCard">
    <h2>Iniciar sesión</h2>
    <form id="loginForm">
      <label for="correo">Correo</label>
      <input id="correo" type="email" required autocomplete="username" />
      <label for="contrasena">Contraseña</label>
      <input id="contrasena" type="password" required autocomplete="current-password" />
      <button type="submit">Iniciar sesión</button>
    </form>
    <small>
      <strong>Administrador</strong> (menú completo): admin@demo.local / admin123<br />
      <strong>Empleado</strong> (buscar e insertar, como menu2): empleado@demo.local / admin123
    </small>
  </main>

  <!-- Tras login: mismo orden visual que menu.html / menu2.html: header → nav → contenido → imagen abajo -->
  <div id="shell" class="hidden">
    <header class="demo-header">
      <h1>Bienvenido/a a nuestra Veterinaria</h1>
      <div class="rol-badge" id="rolBadge"></div>
    </header>

    <!-- Menú administrador (orden de menu.html) -->
    <nav id="navAdmin" class="demo-nav hidden" aria-label="Menú administrador">
      <button type="button" data-go="admin-crear-usuario">Crear Usuario</button>
      <button type="button" data-go="admin-submenu-insertar">Insertar Registros</button>
      <button type="button" data-go="admin-submenu-modificar">Modificar en la Base de Datos</button>
      <button type="button" data-go="admin-submenu-buscar">Buscar Usuarios en la Base de Datos</button>
      <button type="button" data-go="admin-submenu-eliminar">Eliminar Registros de la Base de Datos</button>
      <button type="button" data-go="admin-submenu-reportes">Generar Reportes</button>
      <button type="button" id="logoutAdmin">Cerrar Sesión</button>
    </nav>

    <!-- Menú empleado (orden de menu2.html) -->
    <nav id="navEmpleado" class="demo-nav hidden" aria-label="Menú empleado">
      <button type="button" data-go="emp-buscar-cita">Buscar cita</button>
      <button type="button" data-go="emp-buscar-pacientes">Buscar Paciente</button>
      <button type="button" data-go="emp-buscar-propietarios">Buscar Propietarios</button>
      <button type="button" data-go="emp-buscar-productos">Buscar Productos</button>
      <button type="button" data-go="emp-insertar-cita">Insertar citas</button>
      <button type="button" data-go="emp-insertar-paciente">Insertar Pacientes</button>
      <button type="button" data-go="emp-insertar-propietario">Insertar propietarios</button>
      <button type="button" data-go="emp-eliminar-cita">Eliminar citas</button>
      <button type="button" id="logoutEmpleado">Cerrar Sesión</button>
    </nav>

    <div id="workspace"></div>

    <!-- Imagen debajo del contenido (misma URL que menu.html / menu2.html) -->
    <img
      src="https://w0.peakpx.com/wallpaper/463/467/HD-wallpaper-pets-pet-kittten-caine-cat-pisici-animal-dog-puppy.jpg"
      alt="Imagen de mascotas"
      class="mascota-imagen"
    />
    
    <footer style="text-align: center; padding: 20px; color: #666; font-size: 14px; border-top: 1px solid #ddd;">
      © 2026 Fernando — All rights reserved.
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
